<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Light it Challenge</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0F172A;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      padding: 40px 32px;
    }

    h1 {
      color: #7B8DDE;
      font-size: 24px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 12px;
      text-align: center;
    }

    p {
      color: rgba(243, 243, 243, 0.6);
      font-size: 15px;
      font-weight: 300;
      text-align: center;
      margin-bottom: 48px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 282px;
    }

    a {
      display: block;
      text-align: center;
      padding: 16px 48px;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: #fff;
      text-decoration: none;
      background: linear-gradient(135deg, #7b8cde, #5a6fd1);
      border-radius: 40px;
      box-shadow: 0 4px 20px rgba(90, 111, 209, 0.3);
      transition: all 0.3s ease;
    }

    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(90, 111, 209, 0.4);
    }

    a.secondary {
      background: transparent;
      color: #5C71D2;
      box-shadow: none;
      font-size: 14px;
    }

    a.secondary:hover {
      background: rgba(243, 243, 243, 0.06);
      box-shadow: none;
    }
  </style>
</head>
<body>
  <h1>Light it Challenge</h1>
  <p>A calm space to breathe and ground yourself.</p>
  <div class="links">
    <a href="breathing_sphere.html">Breathing Exercise</a>
    <a href="grounding.html" class="secondary">Grounding Exercise</a>
  </div>
</body>
</html>
